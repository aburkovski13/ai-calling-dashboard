<div class="page">
    <div class="container">
        <div class="wizard">
            <!-- STEP 1 -->
            <div class="step">
                <div class="rail">
                    <div
                        class="dot"
                        [class.dot--done]="isDone(1)"
                        [class.dot--active]="isActive(1)"
                    >
                        1
                    </div>
                    <div class="line"></div>
                </div>

                <div class="panel" [class.panel--done]="isDone(1)">
                    <div class="step-head">
                        <div>
                            <div class="step-title">Hotel profile</div>
                            <div class="step-sub">Basic hotel details</div>
                        </div>

                        <button
                            class="edit"
                            type="button"
                            *ngIf="isDone(1)"
                            (click)="editStep(1)"
                            aria-label="Edit step 1"
                        >
                            edit
                        </button>
                    </div>

                    <div class="step-body" [class.step-body--disabled]="isDone(1)">
                        <app-hotel-profile (completed)="onHotelCompleted()"></app-hotel-profile>
                    </div>
                </div>
            </div>

            <!-- STEP 2 -->
            <div class="step" *ngIf="step >= 2" @reveal>
                <div class="rail">
                    <div
                        class="dot"
                        [class.dot--done]="isDone(2)"
                        [class.dot--active]="isActive(2)"
                    >
                        2
                    </div>
                    <div class="line"></div>
                </div>

                <div class="panel" [class.panel--done]="isDone(2)">
                    <div class="step-head">
                        <div>
                            <div class="step-title">Telephony integration</div>
                            <div class="step-sub">Twilio & SIP settings</div>
                        </div>

                        <button
                            class="edit"
                            type="button"
                            *ngIf="isDone(2)"
                            (click)="editStep(2)"
                            aria-label="Edit step 2"
                        >
                            edit
                        </button>
                    </div>

                    <div class="step-body" [class.step-body--disabled]="isDone(2)">
                        <app-telephony-integration
                            (completed)="onPhoneNumberIntegrationCompleted()"
                        ></app-telephony-integration>
                    </div>
                </div>
            </div>

            <!-- STEP 3 -->
            <div class="step step--last" *ngIf="step >= 3" @reveal>
                <div class="rail">
                    <div
                        class="dot"
                        [class.dot--done]="isDone(3)"
                        [class.dot--active]="isActive(3)"
                    >
                        3
                    </div>
                </div>

                <div class="panel" [class.panel--done]="isDone(3)">
                    <div class="step-head">
                        <div>
                            <div class="step-title">AI call configuration</div>
                            <div class="step-sub">Assistant message + demo recipient</div>
                        </div>

                        <button
                            class="edit"
                            type="button"
                            *ngIf="isDone(3)"
                            (click)="editStep(3)"
                            aria-label="Edit step 3"
                        >
                            edit
                        </button>
                    </div>

                    <div class="step-body" [class.step-body--disabled]="isDone(3)">
                        <app-ai-call-config (completed)="onAiCompleted()"></app-ai-call-config>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FINAL STEP -->
    <div class="step step--last" *ngIf="step >= 4" @reveal>
        <div class="rail">
            <div class="dot dot--done">✓</div>
        </div>

        <div class="panel panel--success">
            <div class="success">
                <mat-icon class="success__icon">call</mat-icon>

                <div class="success__title">AI Call Started</div>

                <div class="success__text">
                    The assistant has started calling the recipient. You can monitor the progress in
                    the system logs.
                </div>
            </div>
        </div>
    </div>
</div>
