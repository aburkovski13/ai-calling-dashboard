<mat-card class="card">
    <div class="header">
        <div class="title">
            <mat-icon class="title__icon">call</mat-icon>
            <div>
                <div class="title__text">Phone number Integration (Twilio & SIP)</div>
                <div class="title__sub">
                    Set up the connection so that AI bot can call from your number.
                </div>
            </div>
        </div>
    </div>

    <form class="grid" [formGroup]="form">
        <mat-form-field appearance="outline" class="field">
            <mat-label>Phone number</mat-label>
            <mat-icon matPrefix>phone</mat-icon>
            <input matInput formControlName="phoneNumber" placeholder="+48..." />
            <mat-error
                *ngIf="form.controls.phoneNumber.touched && form.controls.phoneNumber.invalid"
            >
                A phone number is required.
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="field">
            <mat-label>AI bot name</mat-label>
            <mat-icon matPrefix>badge</mat-icon>
            <input matInput formControlName="displayName" placeholder="AI bot name" />
            <mat-error
                *ngIf="form.controls.displayName.touched && form.controls.displayName.invalid"
            >
                Name is required
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="field field--full">
            <mat-label>SIP trunk address</mat-label>
            <mat-icon matPrefix>dns</mat-icon>
            <input
                matInput
                formControlName="sipTrunkAddress"
                placeholder="sip:your-trunk.provider.com"
            />
            <mat-error
                *ngIf="
                    form.controls.sipTrunkAddress.touched && form.controls.sipTrunkAddress.invalid
                "
            >
                A SIP trunk address is required.
            </mat-error>
        </mat-form-field>
    </form>

    <div class="actions">
        <button mat-stroked-button type="button" (click)="form.reset()">Reset</button>

        <button
            mat-flat-button
            color="primary"
            type="button"
            [disabled]="form.invalid"
            (click)="submitPhoneNumber()"
        >
            Save integration
        </button>
    </div>
</mat-card>
